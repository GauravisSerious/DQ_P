name: Build and Deploy GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Upgraded core actions to natively support the Node.js 24 runner standard
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Upgraded from Node 20 to future-proof your build
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      # Upgraded to v4 to remove Node 20 warning strings and support the modern artifact backend
      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      # Upgraded to v4 to natively match the updated v4 upload-pages backend
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
